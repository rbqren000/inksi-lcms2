name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build liblcms2 for iOS arm64
        run: |
          mkdir build-ios && cd build-ios
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DLCMS2_BUILD_SHARED=OFF \
            -DLCMS2_BUILD_STATIC=ON \
            -DLCMS2_BUILD_TOOLS=OFF \
            -DLCMS2_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(sysctl -n hw.ncpu)

      - uses: actions/upload-artifact@v4
        with:
          name: lcms2-ios-arm64
          path: build-ios/liblcms2.a

      - name: Rename for Release
        if: startsWith(github.ref, 'refs/tags/')
        run: cp build-ios/liblcms2.a lcms2-ios-arm64.a

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: lcms2-ios-arm64.a
